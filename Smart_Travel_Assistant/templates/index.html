<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智旅 AI - 智能行程规划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: Microsoft YaHei, PingFang SC, Helvetica Neue, sans-serif;
            background: #f0f2f5;
            color: #333
        }

        :root {
            --primary: #4B6EFF
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #6B8AFF);
            color: white;
            padding: 20px 0;
            text-align: center
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700
        }

        .header p {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 4px
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
            margin-bottom: 24px
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap
        }

        .form-group {
            flex: 1;
            min-width: 200px
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #6E6E73;
            margin-bottom: 6px
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #E5E5EA;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            font-family: inherit
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(75, 110, 255, .15)
        }

        .days-wrap {
            display: flex;
            align-items: center
        }

        .days-wrap button {
            width: 40px;
            height: 42px;
            border: 2px solid #E5E5EA;
            background: #f5f5f7;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-weight: 600
        }

        .days-wrap button:first-child {
            border-radius: 8px 0 0 8px
        }

        .days-wrap button:last-child {
            border-radius: 0 8px 8px 0
        }

        .days-wrap button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary)
        }

        .days-wrap input {
            border-radius: 0 !important;
            text-align: center;
            font-weight: 600;
            width: 70px;
            border-left: none;
            border-right: none
        }

        .pref-section {
            margin-bottom: 18px
        }

        .pref-section label {
            display: block;
            font-size: 14px;
            color: #6E6E73;
            margin-bottom: 10px
        }

        .pref-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        .pref-tag {
            padding: 8px 18px;
            border: 2px solid #E5E5EA;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
            background: white;
            color: #6E6E73;
            font-family: inherit
        }

        .pref-tag:hover {
            border-color: #6B8AFF;
            color: var(--primary)
        }

        .pref-tag.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #6B8AFF);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .btn:hover {
            box-shadow: 0 4px 20px rgba(75, 110, 255, .4)
        }

        .btn:disabled {
            opacity: .6;
            cursor: not-allowed
        }

        .btn .spin {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        .btn.loading .spin {
            display: inline-block
        }

        .btn.loading .btxt {
            display: none
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .results {
            display: none
        }

        .results.show {
            display: block;
            animation: fadeIn .4s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .itin {
            padding: 24px;
            line-height: 1.8;
            font-size: 15px
        }

        .day-card {
            background: #f5f5f7;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary)
        }

        .day-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px
        }

        .day-theme {
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 6px
        }

        .day-summary {
            font-size: 14px;
            color: #6E6E73;
            margin-bottom: 12px
        }

        .spot-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #E5E5EA
        }

        .spot-item:last-child {
            border-bottom: none
        }

        .spot-idx {
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px
        }

        .spot-body {
            flex: 1
        }

        .spot-name {
            font-weight: 600;
            font-size: 15px
        }

        .spot-desc {
            font-size: 13px;
            color: #6E6E73;
            margin-top: 2px
        }

        .spot-meta {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            font-size: 12px;
            color: #6E6E73
        }

        .spot-cat {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 11px
        }

        .cat-经典 {
            background: #FEE2E2;
            color: #DC2626
        }

        .cat-美食 {
            background: #FEF3C7;
            color: #D97706
        }

        .cat-文化 {
            background: #DBEAFE;
            color: #2563EB
        }

        .cat-自然 {
            background: #D1FAE5;
            color: #059669
        }

        .cat-拍照 {
            background: #F3E8FF;
            color: #7C3AED
        }

        .cat-亲子 {
            background: #FCE7F3;
            color: #DB2777
        }

        .error-box {
            background: #FEF2F2;
            border: 1px solid #FCA5A5;
            color: #DC2626;
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none
        }

        .error-box.show {
            display: block
        }

        .loading-box {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: #f5f5f7;
            color: #6E6E73;
            font-size: 15px;
            border-radius: 10px
        }

        .loading-box .sp {
            width: 28px;
            height: 28px;
            border: 3px solid #E5E5EA;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-right: 12px
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #6E6E73;
            font-size: 13px
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px
            }

            .header h1 {
                font-size: 22px
            }

            .card {
                padding: 20px
            }

            .form-row {
                flex-direction: column
            }

            .form-group {
                min-width: 100%
            }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>智旅 AI . 智能行程规划</h1>
    <p>输入目的地和天数，一键生成专属旅行行程</p>
</div>
<div class="container">
    <div class="card">
        <h2>规划你的旅程</h2>
        <div class="error-box" id="errMsg"></div>
        <div class="form-row">
            <div class="form-group">
                <label>目的地</label>
                <input type="text" id="dest" placeholder="例如：北京、东京、巴黎..." value="北京">
            </div>
            <div class="form-group">
                <label>出行天数</label>
                <div class="days-wrap">
                    <button id="dec">-</button>
                    <input type="number" id="days" min="1" max="30" value="3" readonly>
                    <button id="inc">+</button>
                </div>
            </div>
        </div>
        <div class="pref-section">
            <label>偏好标签（可选，点击选择）</label>
            <div class="pref-tags" id="tags">
                <div class="pref-tag" data-p="经典">经典</div>
                <div class="pref-tag" data-p="美食">美食</div>
                <div class="pref-tag" data-p="文化">文化</div>
                <div class="pref-tag" data-p="自然">自然</div>
                <div class="pref-tag" data-p="拍照">拍照</div>
                <div class="pref-tag" data-p="亲子">亲子</div>
            </div>
        </div>
        <button class="btn" id="genBtn"><span class="spin"></span><span class="btxt">一键生成行程</span></button>
    </div>
    <div class="results" id="results">
        <div class="card" id="itinCard" style="display:none">
            <h2>详细行程</h2>
            <div class="itin" id="itinContent"></div>
        </div>
        <div style="text-align:center;padding:16px">
            <button onclick="window.scrollTo({top:0,behavior:'smooth'});document.getElementById('dest').focus()"
                    style="padding:10px 28px;background:white;border:2px solid var(--primary);color:var(--primary);border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">
                重新规划
            </button>
        </div>
    </div>
    <div class="footer">智旅 AI . Smart Travel Assistant</div>
</div>
<script>
    document.getElementById("dec").onclick = function () {
        var v = parseInt(document.getElementById("days").value) || 1;
        if (v > 1) document.getElementById("days").value = v - 1
    };
    document.getElementById("inc").onclick = function () {
        var v = parseInt(document.getElementById("days").value) || 1;
        if (v < 30) document.getElementById("days").value = v + 1
    };
    document.querySelectorAll(".pref-tag").forEach(function (t) {
        t.onclick = function () {
            this.classList.toggle("active")
        }
    });
    document.getElementById("dest").onkeydown = function (e) {
        if (e.key == "Enter") generate()
    };
    document.getElementById("genBtn").onclick = generate;

    async function generate() {
        var dest = document.getElementById("dest").value.trim();
        var days = parseInt(document.getElementById("days").value) || 3;
        var prefs = [];
        document.querySelectorAll(".pref-tag.active").forEach(function (t) {
            prefs.push(t.dataset.p)
        });
        var err = document.getElementById("errMsg");
        err.classList.remove("show");
        if (!dest) {
            err.textContent = "请输入目的地";
            err.classList.add("show");
            return
        }
        if (days < 1 || days > 30) {
            err.textContent = "出行天数请设置在 1-30 天之间";
            err.classList.add("show");
            return
        }
        var btn = document.getElementById("genBtn");
        btn.classList.add("loading");
        btn.disabled = true;
        var res = document.getElementById("results");
        var ic = document.getElementById("itinCard");
        ic.style.display = "none";
        res.classList.remove("show");
        document.getElementById("itinContent").innerHTML = '<div class="loading-box"><div class="sp"></div><span>AI正在规划行程...</span></div>';
        ic.style.display = "block";
        res.classList.add("show");
        try {
            var r = await fetch("/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({destination: dest, days: days, preferences: prefs})
            });
            var d = await r.json();
            if (!d.success) {
                err.textContent = d.error || "生成失败";
                err.classList.add("show");
                res.classList.remove("show");
                return
            }
            renderItin(d.itinerary_data);
        } catch (e) {
            err.textContent = "网络错误: " + e.message;
            err.classList.add("show");
            res.classList.remove("show")
        } finally {
            btn.classList.remove("loading");
            btn.disabled = false
        }
    }

    function renderItin(data) {
        var h = document.getElementById("itinContent");
        if (!data || data.error) {
            h.innerHTML = "<p style=color:red>" + (data && data.error || "失败") + "</p>";
            return
        }
        var it = data.itinerary || [];
        var html = "<h4 style=margin-bottom:12px>" + data.destination + " " + data.days + "天行程规划</h4>";
        if (data.preferences && data.preferences.length) html += '<p style="color:#6E6E73;font-size:14px;margin-bottom:16px">偏好: ' + data.preferences.join(" ") + "</p>";
        var colors = ["#4B6EFF", "#34C759", "#FF9500", "#AF52DE", "#FF3B30", "#FF6BB5"];
        it.forEach(function (day, i) {
            var sp = day.spots || [];
            var c = colors[i % colors.length];
            html += '<div class="day-card" style="border-left-color:' + c + '">';
            html += '<div class="day-title">第' + (day.day || i + 1) + "天" + (day.date ? " . " + day.date : "") + "</div>";
            html += '<div class="day-theme">' + ((day.theme) || "") + "</div>";
            if (day.summary) html += '<div class="day-summary">' + day.summary + "</div>";
            sp.forEach(function (s, j) {
                html += '<div class="spot-item"><div class="spot-idx" style="background:' + c + '">' + (j + 1) + '</div>';
                html += '<div class="spot-body"><div class="spot-name">' + s.name + "</div>";
                if (s.description) html += '<div class="spot-desc">' + s.description + "</div>";
                html += '<div class="spot-meta">';
                if (s.category) html += '<span class="spot-cat cat-' + s.category + '">' + s.category + "</span>";
                if (s.duration) html += "<span>" + s.duration + "</span>";
                html += "</div>";
                if (s.tips) html += '<div style="font-size:12px;color:#6E6E73;margin-top:4px">' + s.tips + "</div>";
                html += "</div></div>";
            });
            html += "</div>";
        });
        h.innerHTML = html;
    }
</script>
</body>
</html>
